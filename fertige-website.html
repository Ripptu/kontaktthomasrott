    <style>
      body { margin: 0; background: #f2f2f2; }
      .loader-container { height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }

      @keyframes spin { to { transform: rotate(360deg); } }

    <script>
      window.onerror = function(msg, url, line, col, error) {
        var err = document.getElementById('error-msg');
        if(err) {
          err.style.display = 'block';
          err.innerHTML = '<strong style="color:red">JS Error:</strong> ' + msg + '<br><br>Line: ' + line + '<br>URL: ' + url;
        }
      };
      window.addEventListener('unhandledrejection', function(event) {
        var err = document.getElementById('error-msg');
        if(err) {
          err.style.display = 'block';
          err.innerHTML = '<strong style="color:red">Promise Error:</strong> ' + (event.reason && event.reason.message ? event.reason.message : event.reason);
        }
      });
    </script>

    <script>
      if (window.location.protocol === 'file:') {
        document.getElementById('error-msg').innerHTML = '<strong style="color:red; font-size: 16px;">FEHLER: Lokale Datei geöffnet!</strong><br/><br/>Du hast die Datei per Doppelklick auf deinem PC geöffnet (file://).<br/><br/>Aus Sicherheitsgründen (CORS) blockieren Browser moderne Web-Apps, wenn sie lokal geöffnet werden.<br/><br/><b>Lösung:</b> Lade diese Datei auf deinen Webserver (Strato, Ionos etc.) hoch und rufe sie über deine echte Domain auf!';
        document.getElementById('error-msg').style.display = 'block';
      } else {
        setTimeout(() => {
          const errorMsg = document.getElementById('error-msg');
          if (errorMsg && errorMsg.style.display !== 'block') {
            errorMsg.style.display = 'block';
            errorMsg.innerHTML = '<strong style="color:red">Ladefehler!</strong><br/><br/>Die App konnte nicht gestartet werden.<br/><br/>Mögliche Gründe:<br/>1. Du verwendest einen sehr alten Browser.<br/>2. Dein Webserver blockiert Skripte (CSP).<br/>3. Die Datei wurde beim Hochladen beschädigt.';
          }
        }, 3000);
      }
    </script>
  </body>
</html>
