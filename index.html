<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23000' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2'%3E%3C/path%3E%3Ccircle cx='12' cy='7' r='4'%3E%3C/circle%3E%3C/svg%3E" />
    <title>Thomas Rott | Facility Management</title>
    <style>
      body { margin: 0; background: #f2f2f2; }
      .loader-container { height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
      .spinner { width: 32px; height: 32px; border: 3px solid rgba(0,0,0,0.05); border-radius: 50%; border-top-color: #111; animation: spin 1s ease-in-out infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      #error-msg { display: none; margin-top: 24px; color: #666; font-size: 13px; text-align: center; max-width: 320px; line-height: 1.5; background: white; padding: 16px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader-container">
        <div class="spinner"></div>
        <div id="error-msg">
          <strong style="color: #111; font-size: 14px;">Die App kann nicht gestartet werden.</strong><br/><br/>
          Hast du den unfertigen Quellcode hochgeladen?<br/><br/>
          Du musst zuerst <b>npm run build</b> ausführen und dann <u>nur</u> den Inhalt des <b>dist</b>-Ordners auf deinen Webserver hochladen!
        </div>
      </div>
    </div>
    <script>
      // Show error message if React hasn't mounted after 3 seconds
      setTimeout(() => {
        const errorMsg = document.getElementById('error-msg');
        if (errorMsg) errorMsg.style.display = 'block';
      }, 3000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
