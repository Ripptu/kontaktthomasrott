<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23000' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2'%3E%3C/path%3E%3Ccircle cx='12' cy='7' r='4'%3E%3C/circle%3E%3C/svg%3E" />
    <title>Thomas Rott | Facility Management</title>
    <style>
      body { margin: 0; background: #f2f2f2; }
      .loader-container { height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
      .spinner { width: 32px; height: 32px; border: 3px solid rgba(0,0,0,0.05); border-radius: 50%; border-top-color: #111; animation: spin 1s ease-in-out infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      #error-msg { display: none; margin-top: 24px; color: #666; font-size: 13px; text-align: center; max-width: 320px; line-height: 1.5; background: white; padding: 16px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); word-break: break-word; }
    </style>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var err = document.getElementById('error-msg');
        if(err) {
          err.style.display = 'block';
          err.innerHTML = '<strong style="color:red">JS Error:</strong> ' + msg + '<br><br>Line: ' + line + '<br>URL: ' + url;
        }
      };
      window.addEventListener('unhandledrejection', function(event) {
        var err = document.getElementById('error-msg');
        if(err) {
          err.style.display = 'block';
          err.innerHTML = '<strong style="color:red">Promise Error:</strong> ' + (event.reason && event.reason.message ? event.reason.message : event.reason);
        }
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div class="loader-container">
        <div class="spinner"></div>
        <div id="error-msg">
          <strong style="color: #111; font-size: 14px;">Die App lädt nicht.</strong><br/><br/>
          Das liegt zu 100% daran, dass auf deinem Server noch der alte Quellcode liegt.<br/><br/>
          <b>Lösung:</b><br/>
          1. Lösche die alte <code>index.html</code> auf deinem Server.<br/>
          2. Lade die <code>fertige-website.html</code> hoch.<br/>
          3. Benenne sie auf dem Server in <code>index.html</code> um.
        </div>
      </div>
    </div>
    <script>
      if (window.location.protocol === 'file:') {
        document.getElementById('error-msg').innerHTML = '<strong style="color:red; font-size: 16px;">FEHLER: Lokale Datei geöffnet!</strong><br/><br/>Du hast die Datei per Doppelklick auf deinem PC geöffnet (file://).<br/><br/>Aus Sicherheitsgründen (CORS) blockieren Browser moderne Web-Apps, wenn sie lokal geöffnet werden.<br/><br/><b>Lösung:</b> Lade diese Datei auf deinen Webserver (Strato, Ionos etc.) hoch und rufe sie über deine echte Domain auf!';
        document.getElementById('error-msg').style.display = 'block';
      } else {
        setTimeout(() => {
          const errorMsg = document.getElementById('error-msg');
          if (errorMsg && errorMsg.style.display !== 'block') {
            errorMsg.style.display = 'block';
            errorMsg.innerHTML = '<strong style="color:red">Ladefehler!</strong><br/><br/>Die App konnte nicht gestartet werden.<br/><br/>Mögliche Gründe:<br/>1. Du verwendest einen sehr alten Browser.<br/>2. Dein Webserver blockiert Skripte (CSP).<br/>3. Die Datei wurde beim Hochladen beschädigt.';
          }
        }, 3000);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
